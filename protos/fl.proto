syntax = "proto3";

package fl;

message LocalModel {
    string client_id = 1;
    bytes model_weights = 2; // 【关键】用于存放 PyTorch 序列化后的 state_dict
    int32 num_samples = 3;   // 【关键】用于 FedAvg 的加权计算
    int32 round_number = 4;
    repeated float rp_vector = 5;
}

message ServerResponse {
    bool success = 1;
    string message = 2;
}

message GlobalModelRequest {
    int32 round_number = 1;
}

message GlobalModelResponse {
    bytes global_weights = 1; // 服务器下发的全局权重
    bool is_ready = 2;
}

service FederatedLearning {
    rpc UploadLocalModel (LocalModel) returns (ServerResponse);
    rpc GetGlobalModel (GlobalModelRequest) returns (GlobalModelResponse);
}